<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Monitoring — Wire Challenge Leaderboard</title>
<style>
  :root {
    --aqua: #58c3bb;
    --aqua-dark: #3fa89f;
    --aqua-light: #e8f9f8;
    --aqua-glow: rgba(88, 195, 187, 0.15);
    --grey: #8d9091;
    --grey-dark: #5a5c5d;
    --white: #ffffff;
    --bg: #f5fafa;
    --bg2: #eef7f6;
    --card: #ffffff;
    --gold: #c8960a;
    --silver: #6b7880;
    --bronze: #a0521a;
    --font: Calibri, 'Segoe UI', Tahoma, Geneva, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    color: var(--grey-dark);
    overflow-x: hidden;
  }

  /* Subtle animated background */


  /* HEADER */
  header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 3px solid var(--aqua);
    background: white;
    box-shadow: 0 2px 8px rgba(88,195,187,0.12);
  }

  header img {
    height: 52px;
    object-fit: contain;
  }

  .header-right {
    text-align: right;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--aqua);
    letter-spacing: 0.5px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--grey-dark);
    margin-top: 2px;
  }

  /* LIVE DOT */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(88,195,187,0.12);
    border: 1px solid rgba(88,195,187,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--aqua);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 6px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--aqua);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* TOP 3 PODIUM */
  .podium {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  .podium-item {
    flex: 1;
    max-width: 240px;
    text-align: center;
    animation: riseIn 0.6s ease both;
  }
  .podium-item:nth-child(1) { animation-delay: 0.1s; }
  .podium-item:nth-child(2) { animation-delay: 0s; }
  .podium-item:nth-child(3) { animation-delay: 0.2s; }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .podium-block {
    border-radius: 12px 12px 0 0;
    padding: 20px 16px 16px;
    position: relative;
  }
  .podium-1st .podium-block {
    background: linear-gradient(160deg, #fffbea 0%, #fff8d6 100%);
    border: 2px solid rgba(200,150,10,0.35);
    min-height: 160px;
    box-shadow: 0 4px 20px rgba(200,150,10,0.1);
  }
  .podium-2nd .podium-block {
    background: linear-gradient(160deg, #f4f6f7 0%, #edf0f2 100%);
    border: 2px solid rgba(107,120,128,0.3);
    min-height: 130px;
  }
  .podium-3rd .podium-block {
    background: linear-gradient(160deg, #fdf3ec 0%, #faeade 100%);
    border: 2px solid rgba(160,82,26,0.25);
    min-height: 110px;
  }

  .podium-medal {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
  }
  .podium-rank {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .podium-1st .podium-rank { color: var(--gold); }
  .podium-2nd .podium-rank { color: var(--silver); }
  .podium-3rd .podium-rank { color: var(--bronze); }

  .podium-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--grey-dark);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .podium-company {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .podium-time {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .podium-1st .podium-time { color: var(--gold); }
  .podium-2nd .podium-time { color: var(--silver); }
  .podium-3rd .podium-time { color: var(--bronze); }

  .podium-base {
    height: 16px;
    border-radius: 0 0 4px 4px;
  }
  .podium-1st .podium-base { background: rgba(245,200,66,0.3); }
  .podium-2nd .podium-base { background: rgba(192,200,204,0.2); }
  .podium-3rd .podium-base { background: rgba(212,137,90,0.2); }

  /* REST OF TABLE */
  .table-section {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    padding: 24px;
  }
  .table-section h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--grey);
    margin-bottom: 12px;
    padding-left: 4px;
    border-left: 2px solid var(--aqua);
    padding-left: 10px;
  }

  .leaderboard-table {
    width: 100%;
    border-collapse: collapse;
  }

  .leaderboard-table thead tr {
    border-bottom: 1px solid rgba(88,195,187,0.25);
  }
  .leaderboard-table thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--grey-dark);
    padding: 8px 12px 10px;
  }
  .leaderboard-table thead th.right { text-align: right; }

  .leaderboard-table tbody tr {
    border-bottom: 1px solid #eef5f5;
    transition: background 0.2s;
    animation: fadeIn 0.4s ease both;
  }
  .leaderboard-table tbody tr:hover {
    background: rgba(88,195,187,0.05);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .leaderboard-table tbody td {
    padding: 14px 12px;
    font-size: 15px;
    color: var(--grey-dark);
  }

  .td-rank {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey);
    width: 48px;
  }
  .td-name { font-weight: 700; }
  .td-company { color: var(--grey); font-size: 14px; }
  .td-time {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 17px;
    color: var(--aqua);
    letter-spacing: 0.5px;
  }

  /* NEW ENTRY FLASH */
  .new-entry {
    animation: newFlash 2s ease both;
  }
  @keyframes newFlash {
    0% { background: rgba(88,195,187,0.25); }
    100% { background: transparent; }
  }

  /* EMPTY / LOADING STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--grey-dark);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }

  /* STATUS BAR */
  .status-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: white;
    border-top: 1px solid rgba(88,195,187,0.3);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--grey);
  }
  .status-bar span { }
  .status-bar .updated { color: var(--aqua); }

  /* Reorder animation */
  .leaderboard-table tbody tr {
    transition: background 0.3s;
  }
</style>
</head>

<main>
  <div id="podium" class="podium" style="display:none"></div>
  <div id="tableSection" class="table-section" style="display:none">
    <h2>All Scores</h2>
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Company</th>
          <th class="right">Time</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>

  </div>

<div class="status-bar">
  <span>Arc Monitoring — Wire Challenge Leaderboard</span>
  <span class="updated" id="lastUpdated">Connecting…</span>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const SHEET_ID  = "1LAQzUvat7A_xJAv0cBa_8OvajuHi4diW_ffXwXYVc80";
const SHEET_GID = "1123333909";
const REFRESH_INTERVAL = 10000; // 10 seconds

// Column indices in your Google Sheet (0-based)
// Order: Timestamp, Name, Company Name, Email Address, Time (Seconds)
const COL_NAME    = 1;
const COL_COMPANY = 2;
const COL_EMAIL   = 3;
const COL_TIME    = 4;
// ─────────────────────────────────────────────────────────────────────────────

let previousEntries = [];
let newEntryKeys = new Set();

function parseTime(str) {
  if (!str) return Infinity;
  str = str.trim();
  // MM:SS:ms format e.g. 00:58:27 (current format)
  const match1 = str.match(/^(\d+):(\d+):(\d+)$/);
  if (match1) {
    return parseInt(match1[1]) * 60000 + parseInt(match1[2]) * 1000 + parseInt(match1[3]) * 10;
  }
  // MM:SS.T format e.g. 00:58.2 (old format)
  const match2 = str.match(/^(\d+):(\d+)\.(\d)$/);
  if (match2) {
    return parseInt(match2[1]) * 60000 + parseInt(match2[2]) * 1000 + parseInt(match2[3]) * 100;
  }
  // Fallback: raw number of seconds
  const n = parseFloat(str);
  return isNaN(n) ? Infinity : n * 1000;
}

function formatTimeDisplay(str) {
  return str ? str.trim() : "—";
}

function entryKey(row) {
  return (row[COL_NAME] || "") + "|" + (row[COL_EMAIL] || "") + "|" + (row[COL_TIME] || "");
}

async function fetchScores() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    // Google wraps the JSON in /*O_o*/google.visualization.Query.setResponse(...)
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;

    // Parse rows — skip first row (sheet headers)
    const entries = rows
      .slice(1)
      .map(r => r.c.map(c => c ? (c.v !== null && c.v !== undefined ? String(c.v) : "") : ""))
      .filter(r => r[COL_NAME] && r[COL_TIME] && parseTime(r[COL_TIME]) >= 10000); // must have name, time, and be 10s or over

    // Sort by time ascending
    entries.sort((a, b) => parseTime(a[COL_TIME]) - parseTime(b[COL_TIME]));

    // Detect new entries
    const prevKeys = new Set(previousEntries.map(entryKey));
    newEntryKeys = new Set(entries.filter(r => !prevKeys.has(entryKey(r))).map(entryKey));
    previousEntries = entries;

    return entries;
  } catch(e) {
    console.error("Failed to fetch scores:", e);
    return null;
  }
}

function renderPodium(entries) {
  const podium = document.getElementById("podium");
  if (entries.length === 0) { podium.style.display = "none"; return; }

  const medals = ["🥇", "🥈", "🥉"];
  const ranks  = ["1st", "2nd", "3rd"];
  const classes = ["podium-1st", "podium-2nd", "podium-3rd"];
  // Reorder for display: 2nd, 1st, 3rd
  const displayOrder = [1, 0, 2];
  const top = entries.slice(0, Math.min(3, entries.length));

  const slots = displayOrder.map(i => top[i]).filter(Boolean);

  podium.innerHTML = slots.map((entry, displayIdx) => {
    const originalIdx = displayOrder[displayIdx];
    const cls = classes[originalIdx];
    const name    = entry[COL_NAME] || "—";
    const company = entry[COL_COMPANY] || "";
    const time    = formatTimeDisplay(entry[COL_TIME]);
    const isNew   = newEntryKeys.has(entryKey(entry));
    return `
      <div class="podium-item ${cls}${isNew ? " new-entry" : ""}">
        <div class="podium-block">
          <span class="podium-medal">${medals[originalIdx]}</span>
          <div class="podium-rank">${ranks[originalIdx]}</div>
          <div class="podium-name">${escapeHtml(name)}</div>
          ${company ? `<div class="podium-company">${escapeHtml(company)}</div>` : ''}
          <div class="podium-time">${escapeHtml(time)}</div>
        </div>
        <div class="podium-base"></div>
      </div>`;
  }).join("");

  podium.style.display = "flex";
}

function renderTable(entries) {
  const section = document.getElementById("tableSection");
  const body    = document.getElementById("tableBody");
  const empty   = document.getElementById("emptyState");

  if (entries.length === 0) {
    section.style.display = "none";
    empty.style.display   = "block";
    return;
  }

  empty.style.display   = "none";
  section.style.display = "block";

  // Always show all entries in the table
  const tableEntries = entries;
  const offset = 1;

  body.innerHTML = tableEntries.map((entry, i) => {
    const rank    = i + offset;
    const name    = entry[COL_NAME] || "—";
    const company = entry[COL_COMPANY] || "—";
    const time    = formatTimeDisplay(entry[COL_TIME]);
    const isNew   = newEntryKeys.has(entryKey(entry));
    return `
      <tr class="${isNew ? "new-entry" : ""}" style="animation-delay:${i * 0.04}s">
        <td class="td-rank">${rank}</td>
        <td class="td-name">${escapeHtml(name)}</td>
        <td class="td-company">${escapeHtml(company)}</td>
        <td class="td-time">${escapeHtml(time)}</td>
      </tr>`;
  }).join("");
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function updateLastUpdated() {
  const now = new Date();
  const t = now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("lastUpdated").textContent = `Last updated ${t} · refreshes every 10s`;
}

async function refresh() {
  const entries = await fetchScores();
  if (entries !== null) {
    renderPodium(entries);
    renderTable(entries);
    updateLastUpdated();
  }
}

// Initial load + polling
refresh();
setInterval(refresh, REFRESH_INTERVAL);
</script>
